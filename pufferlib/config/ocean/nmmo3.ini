[base]
package = ocean
env_name = puffer_nmmo3
policy_name =  NMMO3MinGRU
rnn_name = NMMO3LSTM

[vec]
num_envs = 4

[env]
num_envs = 4
num_agents = 1024
width = 512
height = 512
num_enemies = 2048
num_resources = 2048
num_weapons = 1024
num_gems = 512
tiers = 5
levels = 40
teleportitis_prob = 0.001
enemy_respawn_ticks = 2
item_respawn_ticks = 100
x_window = 7
y_window = 5
reward_combat_level = 1.0
reward_prof_level = 1.0
reward_item_level = 1.0
reward_market = 0.0
reward_death = -1.0

[policy]
hidden_size = 512
num_layers = 4
expansion_factor = 1

[train]
total_timesteps = 107000000000
checkpoint_interval = 1000
learning_rate = 0.0004573146765703167
gamma = 0.7647543366891623
gae_lambda = 0.996005622445478
ent_coef = 0.01210084358004069
max_grad_norm = 0.6075578331947327
vf_coef = 0.3979089612467003
bptt_horizon = 64
batch_size = 524288
minibatch_size = 32768
max_minibatch_size = 32768

[sweep]
metric = min_comb_prof
max_cost = 900

[sweep.env.num_envs]
distribution = uniform_pow2
min = 1
max = 8
mean = 4
scale = 0.5

[sweep.env.reward_combat_level]
distribution = uniform
min = 0.0
max = 1.0
mean = 0.5
scale = auto

[sweep.env.reward_prof_level]
distribution = uniform
min = 0.0
max = 1.0
mean = 0.5
scale = auto

[sweep.env.reward_item_level]
distribution = uniform
min = 0.0
max = 1.0
mean = 1.0
scale = auto

[sweep.env.reward_death]
distribution = uniform
min = -1.0
max = 0.0
mean = -1.0
scale = auto
