[base]
package = ocean
env_name = puffer_block_puzzle
policy_name = BlockPuzzle
rnn_name = None

[policy]
hidden_size = 256

[vec]
num_envs = 8

[env]
num_envs = 2048
board_size = 10
allow_rotations = True
reward_per_block = 0.10
line_bonus = 1.0
multi_line_bonus = 0.5
invalid_penalty = -0.25
loss_penalty = -1.0

[train]
total_timesteps = 1_000_000_000
batch_size = auto
bptt_horizon = 64
minibatch_size = 65536
adam_beta1 = 0.95
adam_beta2 = 0.9999
adam_eps = 1e-8
clip_coef = 0.1
ent_coef = 0.01
gae_lambda = 0.95
gamma = 0.995
learning_rate = 0.001
max_grad_norm = 0.5
prio_alpha = 0.8
prio_beta0 = 0.1
vf_clip_coef = 0.2
vf_coef = 1.0
vtrace_c_clip = 1.0
vtrace_rho_clip = 1.0
