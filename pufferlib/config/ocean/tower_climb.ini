[base]
package = ocean
env_name = puffer_tower_climb
policy_name = TowerClimb
rnn_name = TowerClimbLSTM

[vec]
num_envs = 4

[env]
num_envs = 1024
num_maps = 50
reward_climb_row = 0.636873185634613
reward_fall_row = -0.15898257493972778
reward_illegal_move = -0.003928301855921745
reward_move_block = 0.235064297914505

[train]
total_timesteps = 150_000_000
#gamma = 0.98
#learning_rate = 0.05
minibatch_size = 32768

[sweep]
downsample = 10
max_cost = 500

[sweep.train.total_timesteps]
distribution = uniform
min = 2e7
max = 1e8
mean = 1e9
scale = auto

[sweep.policy.hidden_size]
distribution = uniform_pow2
min = 16
max = 1024
mean = 128
scale = auto

[sweep.env.num_envs]
distribution = uniform_pow2
min = 1
max = 4096
mean = 2048
scale = auto

[sweep.env.reward_climb_row]
distribution = uniform
min = 0.0
max = 1.0
mean = 0.5
scale = auto

[sweep.env.reward_fall_row]
distribution = uniform
min = -1.0
max = 0.0
mean = -0.5
scale = auto

[sweep.env.reward_illegal_move]
distribution = uniform
min = -1e-2
max = -1e-4
mean = -1e-3
scale = auto

[sweep.env.reward_move_block]
distribution = uniform
min = 0.0
max = 1.0
mean = 0.5
scale = auto
