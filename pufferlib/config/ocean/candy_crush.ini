[base]
package = ocean
env_name = puffer_candy_crush
policy_name = Policy
rnn_name = Recurrent

[env]
num_envs = 256
board_size = 8
num_candies = 6
max_steps = 40
reward_per_tile = 0.05
combo_bonus = 0.10
invalid_penalty = -0.20
shuffle_penalty = 0.0

[vec]
num_envs = 8

[train]
total_timesteps = 50_000_000
learning_rate = 0.003
gamma = 0.995
gae_lambda = 0.95
minibatch_size = 32768
bptt_horizon = 64
ent_coef = 0.01

