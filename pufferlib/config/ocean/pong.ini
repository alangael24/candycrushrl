[base]
package = ocean
env_name = puffer_pong 
policy_name = Policy
rnn_name = Recurrent

[policy]
hidden_size = 128

[vec]
num_envs = 4

[env]
num_envs = 4096
num_agents = 1
width = 500
height = 640
paddle_width = 20
paddle_height = 70
ball_width = 32
ball_height = 32
paddle_speed = 8
ball_initial_speed_x = 10
ball_initial_speed_y = 1
ball_speed_y_increment = 3
ball_max_speed_y = 13
max_score = 21
frameskip = 4
continuous = 0

[train]
max_cost=20

total_timesteps = 12_000_000
