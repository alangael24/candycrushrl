[sweep]
downsample = 0

[sweep.policy.hidden_size]
distribution = uniform_pow2
min = 16
max = 1024
scale = auto

[sweep.train.total_timesteps]
distribution = log_normal
min = 5e5
max = 5e6
scale = auto

[sweep.env.num_envs]
distribution = uniform_pow2
min = 1
max = 4096
scale = auto

[sweep.env.frameskip]
distribution = int_uniform
min = 1
max = 8
scale = 2.0
