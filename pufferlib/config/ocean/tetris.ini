[base]
package = ocean
env_name = puffer_tetris
policy_name = Policy
rnn_name = Recurrent

[vec]
num_envs = 4

[env]
num_envs = 1024
deck_size = 3

[policy]
hidden_size = 128

[train]
total_timesteps = 2_000_000_000
batch_size = auto
bptt_horizon = 64
minibatch_size = 32768

[sweep]
metric = score
goal = maximize
max_cost = 300

[sweep.train.total_timesteps]
distribution = log_normal
min = 1e7
max = 1e9
mean = 3e8
scale = auto

[sweep.policy.hidden_size]
distribution = uniform_pow2
min = 16
max = 1024
mean = 128
scale = auto

[sweep.env.num_envs]
distribution = uniform_pow2
min = 1
max = 4096
mean = 2048
scale = auto
