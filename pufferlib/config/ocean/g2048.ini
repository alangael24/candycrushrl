[base]
package = ocean
env_name = puffer_g2048
policy_name = G2048LSTM
rnn_name = Recurrent

[policy]
hidden_size = 512
num_layers = 5

[rnn]
input_size = 128
hidden_size = 128

[vec]
total_agents = 16384
num_threads = 2
num_buffers = 1

[env]
scaffolding_ratio = 0.4071092491980559

[train]
# 512 hidden: https://wandb.ai/kywch/pufferlib/runs/5thsjr61?nw=nwuserkywch
#total_timesteps = 6_767_676_767
total_timesteps = 750_000_000
#anneal_lr = True
#min_lr_ratio = 0.15
batch_size = auto
horizon = 64
minibatch_size = 32768

clip_coef = 0.03248853623167367
ent_coef = 0.018593838090100324
gae_lambda = 0.6470060800473287
gamma = 0.992038008974115
vf_clip_coef = 0.30206295483096207
vf_coef = 1.9192176254065705

learning_rate = 0.002385331355831229
max_grad_norm = 1.109147339781282
replay_ratio = 1.1154633945190966

beta1 = 0.9708456650139332
beta2 = 0.9981412403454364
eps = 0.0000000445265721286
prio_alpha = 0.9213087829626856
prio_beta0 = 0.91747262014073
vtrace_c_clip = 3.437869799701762
vtrace_rho_clip = 2.0730573755177617


### Targeted sweep

[sweep]
max_suggestion_cost = 7200
#sweep_only = endgame_env_prob, scaffolding_ratio, snake_reward_weight, learning_rate, max_grad_norm

[sweep.env.scaffolding_ratio]
distribution = uniform
min = 0.1
mean = 0.5
max = 0.8
scale = auto

[sweep.train.learning_rate]
distribution = uniform
min = 0.0001
