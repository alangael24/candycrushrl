max = 0.0030
scale = 0.5

[sweep.train.max_grad_norm]
distribution = uniform
min = 0.1
mean = 0.5
max = 2.0
scale = 0.5

[sweep.train.vf_clip_coef]
distribution = uniform
min = 0.05
max = 0.5
mean = 0.2
scale = auto


