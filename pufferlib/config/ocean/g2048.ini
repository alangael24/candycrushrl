[base]
package = ocean
env_name = puffer_g2048
policy_name = G2048LSTM
rnn_name = Recurrent

[policy]
hidden_size = 1024
num_layers = 5

[rnn]
input_size = 128
hidden_size = 128

[vec]
total_agents = 16384
num_threads = 2
num_buffers = 2

[env]
scaffolding_ratio = 0.5271290460077294

[train]
# 512 hidden: https://wandb.ai/kywch/pufferlib/runs/5thsjr61?nw=nwuserkywch
#total_timesteps = 6_767_676_767
total_timesteps = 1_150_000_000
#anneal_lr = True
#min_lr_ratio = 0.15
batch_size = auto
horizon = 64
minibatch_size = 65_536

clip_coef = 0.1
ent_coef = 0.004288676848671057
gae_lambda = 0.7286964134151057
gamma = 0.9949730449010225
vf_clip_coef = 0.70990186473777
vf_coef = 0.1

learning_rate = 0.0019571131633638163
max_grad_norm = 0.8653909961694773
replay_ratio = 2.5117499906300083

beta1 = 0.9458833324221108
beta2 = 0.9
eps = 0.0000116696005807621
prio_alpha = 0.9795724957788038
prio_beta0 = 0.9272039168244244
vtrace_c_clip = 3.8026234741781537
vtrace_rho_clip = 1.99188282874688

### Targeted sweep

[sweep]
max_suggestion_cost = 7200
#sweep_only = endgame_env_prob, scaffolding_ratio, snake_reward_weight, learning_rate, max_grad_norm

[sweep.env.scaffolding_ratio]
distribution = uniform
min = 0.1
