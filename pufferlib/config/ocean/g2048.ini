[base]
package = ocean
env_name = puffer_g2048
policy_name = G2048LSTM
rnn_name = Recurrent

[policy]
hidden_size = 512
num_layers = 5

[rnn]
input_size = 128
hidden_size = 128

[vec]
total_agents = 16384
num_threads = 2
num_buffers = 2

[env]
scaffolding_ratio = 0.4489594886306179

[train]
# 512 hidden: https://wandb.ai/kywch/pufferlib/runs/5thsjr61?nw=nwuserkywch
beta1 = 0.9747779326769818
beta2 = 0.9904123982283678
clip_coef = 0.01
ent_coef = 0.01025692276428281
eps = 0.00000055329632094345
gae_lambda = 0.5999999999999999
gamma = 0.9911804750508832
horizon = 64
learning_rate = 0.002184083670457946
max_grad_norm = 0.5537400540195541
minibatch_size = 65536
prio_alpha = 0.9508407436267596
prio_beta0 = 0.9551850524205956
replay_ratio = 2.1784488651291634
total_timesteps = 893_555_865
vf_clip_coef = 0.387823303927097
vf_coef = 1.149976087887222
vtrace_c_clip = 3.5529548361828183
vtrace_rho_clip = 2.416979519317299

[sweep]
max_suggestion_cost = 7200
#sweep_only = endgame_env_prob, scaffolding_ratio, snake_reward_weight, learning_rate, max_grad_norm

[sweep.env.scaffolding_ratio]
distribution = uniform
min = 0.1
mean = 0.5
max = 0.8
scale = auto

[sweep.train.learning_rate]
distribution = uniform
min = 0.0001
mean = 0.0005
max = 0.0030
scale = 0.5

[sweep.train.max_grad_norm]
distribution = uniform
min = 0.1
mean = 0.5
max = 2.0
scale = 0.5

