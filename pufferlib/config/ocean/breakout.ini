[base]
package = ocean
env_name = puffer_breakout
policy_name = MinGRU
rnn_name = Recurrent

[vec]
num_envs = 4

[env]
num_envs = 2048
frameskip = 4
width = 576
height = 330
paddle_width = 62
paddle_height = 8
ball_width = 32
ball_height = 32
brick_width = 32
brick_height = 12
brick_rows = 6
brick_cols = 18
initial_ball_speed = 256
max_ball_speed = 448
paddle_speed = 620
continuous = 0
 
[policy]
hidden_size = 128
num_layers = 2
expansion_factor = 2
d_state = 32
d_conv = 4

[sweep.policy.hidden_size]
distribution = uniform_pow2
min = 16
max = 512
mean = 128
scale = auto

[sweep.policy.num_layers]
distribution = int_uniform
min = 1
max = 4
mean = 2
scale = auto

