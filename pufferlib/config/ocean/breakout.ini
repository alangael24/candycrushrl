[base]
package = ocean
env_name = puffer_breakout
policy_name = Policy
#rnn_name = Recurrent
rnn_name = None

[vec]
#num_envs = 1
num_envs = 4

# Experiment - fewer cores per env to avoid clogging

[env]
#num_envs = 64
num_envs = 2048
frameskip = 1
width = 576
height = 330
paddle_width = 62
paddle_height = 8
ball_width = 32
ball_height = 32
brick_width = 32
brick_height = 12
brick_rows = 6
brick_cols = 18
initial_ball_speed = 256
max_ball_speed = 448
paddle_speed = 620
continuous = 0
 
[policy]
hidden_size = 1024
#hidden_size = 128

[train]
