[sweep]
downsample = 10
max_cost = 240

[sweep.train.total_timesteps]
distribution = log_normal
min = 2e7
max = 9e7
# Experiment: up from 6e7 max
mean = 4e7
scale = auto

[sweep.policy.hidden_size]
distribution = uniform_pow2
min = 16
max = 1024
mean = 128
scale = auto

[sweep.env.num_envs]
distribution = uniform_pow2
min = 1
max = 4096
mean = 2048
scale = auto

[sweep.env.frameskip]
distribution = int_uniform
min = 1
max = 8
mean = 4
scale = 2.0
