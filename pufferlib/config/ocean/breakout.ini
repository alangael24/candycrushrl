[base]
package = ocean
env_name = puffer_breakout
policy_name = Policy
rnn_name = Recurrent

[vec]
num_envs = 8

[env]
num_envs = 1024
frameskip = 4
width = 576
height = 330
paddle_width = 62
paddle_height = 8
ball_width = 32
ball_height = 32
brick_width = 32
brick_height = 12
brick_rows = 6
brick_cols = 18
initial_ball_speed = 256
max_ball_speed = 448
paddle_speed = 620
continuous = 0
 
[policy]
hidden_size = 128

[rnn]
input_size = 128
hidden_size = 128
num_layers = 1

[train]
total_timesteps = 120_000_000
adam_beta1 = 0.8166332218104871
adam_beta2 = 0.9984879989750705
adam_eps = 0.0001
batch_size = auto
bptt_horizon = 64
clip_coef = 0.42526610231849393
ent_coef = 0.0026822968018267775
gae_lambda = 0.995
gamma = 0.9731819086255716
learning_rate = 0.04301709139429238
max_grad_norm = 0.7029618837611082
minibatch_size = 16384
prio_alpha = 0.09999999999999998
prio_beta0 = 0.8437844355214735
vf_clip_coef = 0.807798225723059
vf_coef = 2.9089121311247554
vtrace_c_clip = 1.6205569942514606
vtrace_rho_clip = 1.1777184656786774

[sweep.train.total_timesteps]
distribution = log_normal
min = 3e7
max = 2e8
mean = 8e7
scale = auto

[sweep.env.frameskip]
distribution = int_uniform
min = 1
max = 8
mean = 4
scale = 2.0
