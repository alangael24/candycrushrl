[base]
package = ocean
env_name = puffer_breakout
policy_name = Policy
rnn_name = Recurrent

[vec]
#num_envs = 1
num_envs = 4

# Experiment - fewer cores per env to avoid clogging

[env]
num_envs = 64
#num_envs = 512
frameskip = 1
width = 576
height = 330
paddle_width = 62
paddle_height = 8
ball_width = 32
ball_height = 32
brick_width = 32
brick_height = 12
brick_rows = 6
brick_cols = 18
initial_ball_speed = 256
max_ball_speed = 448
paddle_speed = 620
continuous = 0
 
[policy]
hidden_size = 512

[train]
total_timesteps = 40_000_000
adam_beta1 = 0.9389740236912132
adam_beta2 = 0.9998225039929157
adam_eps = 1.0267361590791064e-8
batch_size = auto
bptt_horizon = 64
clip_coef = 0.01557913923814178
ent_coef = 0.0031759371032913
gae_lambda = 0.916681264452842
gamma = 0.9997053654668936
learning_rate = 0.012744235594115342
max_grad_norm = 1.8013800046071862
num_minibatches = 8
minibatch_size = 4096
prio_alpha = 0.9500430793857082
prio_beta0 = 0.9436845548994959
vf_clip_coef = 0.1
vf_coef = 2.5994729835919834
vtrace_c_clip = 2.878171091654008
vtrace_rho_clip = 1.3235791596831579

[sweep]
downsample = 10
max_cost = 240

[sweep.train.total_timesteps]
distribution = log_normal
min = 2e7
max = 9e7
# Experiment: up from 6e7 max
mean = 4e7
scale = auto

[sweep.policy.hidden_size]
distribution = uniform_pow2
min = 16
max = 1024
mean = 128
scale = auto

[sweep.env.num_envs]
distribution = uniform_pow2
min = 1
max = 4096
mean = 2048
scale = auto

[sweep.env.frameskip]
distribution = int_uniform
min = 1
max = 8
mean = 4
scale = 2.0
