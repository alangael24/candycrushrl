[base]
package = ocean
env_name = puffer_breakout
policy_name = MinGRU
rnn_name = Recurrent

[vec]
#num_envs = 4
#num_envs = 1
total_agents = 8192

[env]
#num_envs = 2048
#num_envs = 8192
num_agents = 1
frameskip = 4
#frameskip = 0
width = 576
height = 330
initial_paddle_width = 62
paddle_width = 62
paddle_height = 8
ball_width = 32
ball_height = 32
brick_width = 32
brick_height = 12
brick_rows = 6
brick_cols = 18
initial_ball_speed = 256
max_ball_speed = 448
paddle_speed = 620
continuous = 0
 
[policy]
hidden_size = 128
num_layers = 4
expansion_factor = 1

[sweep.policy.hidden_size]
