[base]
env_name = tripletriad

[vec]
num_agents = 4096

[policy]
num_layers = 2
hidden_size = 64

[env]
width = 990
height = 690
card_width = 192
card_height = 224

[train]
total_timesteps = 20_000_000
gamma = 0.95

[sweep]
method = Protein 
metric = perf

[sweep.train.total_timesteps]
distribution = log_normal
min = 1e7
max = 2e8
mean = 1e8
scale = time
