[base]
package = ocean
env_name = moba
policy_name = MOBA
rnn_name = Recurrent

[env]
vision_range = 5
agent_speed = 1.0
script_opponents = 1
reward_death = 0.0
reward_xp = 0.0016926873475313188
reward_distance = 0.0
reward_tower = 4.525112152099609

[vec]
total_agents = 2560

[train]
total_timesteps = 150_000_000

[sweep]
downsample = 10

[sweep.env.reward_death]
distribution = uniform
min = -1.0
max = 0
mean = 0
scale = auto

[sweep.env.reward_xp]
distribution = uniform
min = 0.0
max = 0.05
mean = 0.0015
scale = auto

[sweep.env.reward_tower]
distribution = uniform
min = 0.0
max = 1.0
mean = 1.0
scale = auto
