[base]
package = ocean
env_name = drone
policy_name = MinGRU
rnn_name = Recurrent

[vec]
total_agents = 1024

[policy]
hidden_size = 128
num_layers = 4

[env]
task = 1
num_drones = 64
max_rings = 10
alpha_dist = 0.8116961225990836
alpha_hover = 0.00551698934366556
alpha_omega = 0.0008382532864364659
alpha_shaping = 1.4530920628641915
hover_target_dist = 5.0
hover_dist = 0.1
hover_omega = 0.1
hover_vel = 0.1

[train]
total_timesteps = 200_000_000
gamma = 0.9769136350132555
learning_rate = 0.0023536823202288037
min_lr_ratio = 0.022657052131839994
gae_lambda = 0.995
clip_coef = 0.21879735935329342
vf_coef = 4.7444726835171025
vf_clip_coef = 2.3927523224022673
ent_coef = 1.965688238903342e-05
max_grad_norm = 0.1
minibatch_size = 8192
beta1 = 0.985440550468927
beta2 = 0.9935664415331
eps = 8.256208165283457e-08
vtrace_rho_clip = 2.8071842710150943
vtrace_c_clip = 1.3881333510556115
prio_alpha = 0.7008270415440124
prio_beta0 = 0.6884245924740793

[sweep.env.alpha_dist]
distribution = log_normal
min = 0.1
max = 100.0
mean = 1.0
scale = auto

[sweep.env.alpha_omega]
distribution = log_normal
min = 0.0001
max = 1.0
mean = 0.001
scale = auto

[sweep.env.alpha_hover]
distribution = log_normal
min = 0.001
max = 1.0
mean = 0.01
scale = auto

[sweep.env.alpha_shaping]
distribution = log_normal
min = 0.01
max = 10.0
mean = 1.0
scale = auto
