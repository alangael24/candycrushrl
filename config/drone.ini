[base]
env_name = drone

[vec]
total_agents = 2048
num_buffers = 8
num_threads = 1

[env]
task = 1
num_drones = 64
max_rings = 10
alpha_dist = 0.782192
alpha_hover = 0.071445
alpha_omega = 0.00135588
alpha_shaping = 3.9754
hover_target_dist = 5
hover_dist = 0.1
hover_omega = 0.1
hover_vel = 0.1

[policy]
hidden_size = 128
num_layers = 3.80354
expansion_factor = 1

[train]
gpus = 1
seed = 42
total_timesteps = 40000000
learning_rate = 0.00975033
anneal_lr = 1
min_lr_ratio = 0
gamma = 0.981094
gae_lambda = 0.883828
replay_ratio = 2.25498
clip_coef = 0.067834
vf_coef = 4.42222
vf_clip_coef = 3.42278
max_grad_norm = 0.692201
ent_coef = 9.62597e-05
beta1 = 0.914207
beta2 = 0.99988
eps = 1e-14
minibatch_size = 8192
horizon = 32
vtrace_rho_clip = 3.32822
vtrace_c_clip = 4.37219
prio_alpha = 0.427293
prio_beta0 = 1

[sweep.train.total_timesteps]
distribution = log_normal
min = 4e7
max = 3e8
mean = 1e8
scale = auto

[sweep.env.alpha_dist]
distribution = log_normal
min = 0.1
max = 100.0
mean = 1.0
scale = auto

[sweep.env.alpha_omega]
distribution = log_normal
min = 0.0001
max = 1.0
mean = 0.001
scale = auto

[sweep.env.alpha_hover]
distribution = log_normal
min = 0.001
max = 1.0
mean = 0.01
scale = auto

[sweep.env.alpha_shaping]
distribution = log_normal
min = 0.01
max = 10.0
mean = 1.0
scale = auto
