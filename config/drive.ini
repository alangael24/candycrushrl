[base]
env_name = drive

[vec]
total_agents = 8192

[policy]
num_layers = 4
hidden_size = 256

[env]
width = 1280
height = 1024
human_agent_idx = 0
reward_vehicle_collision = -0.2
reward_offroad_collision = -0.2
reward_goal_post_respawn = 0
reward_vehicle_collision_post_respawn = 0
resample_frequency = 10000
num_maps = 500

[train]
total_timesteps = 2_000_000_000
gamma = 0.98
learning_rate= 0.001
horizon = 128
minibatch_size = 8192
gae_lambda = 0.95
ent_coef = 0.005

[sweep.train.total_timesteps]
distribution = log_normal
min = 3e8
max = 3e9
mean = 1e9
scale = auto
 
[sweep.env.reward_vehicle_collision]
distribution = uniform
min = -1.0
max = 0.0
mean = -0.2
scale = auto 
 
[sweep.env.reward_offroad_collision]
distribution = uniform
min = -1.0
max = 0.0
mean = -0.2
scale = auto

[sweep.env.reward_goal_post_respawn]
distribution = uniform
min = 0.0
max = 1.0
mean = 0.5
scale = auto

