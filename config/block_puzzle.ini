[base]
env_name = block_puzzle

[vec]
total_agents = 4096
num_buffers = 4
num_threads = 4

[env]
board_size = 10
allow_rotations = 1
reward_per_block = 0.04
line_bonus = 1.0
multi_line_bonus = 0.5
invalid_penalty = -0.25
loss_penalty = -3.0
shaping_gamma = 0.995
legal_reward_scale = 0.03
hand_finishable_reward_scale = 0.10
dead_visible_piece_penalty_scale = 0.10
fill_penalty_scale = 2.5
fill_penalty_threshold = 0.58
tiny_pocket_penalty_scale = 0.10
max_episode_steps = 500

[policy]
hidden_size = 256
num_layers = 2
expansion_factor = 1

[train]
gpus = 1
seed = 42
total_timesteps = 500_000_000
learning_rate = 0.001
anneal_lr = 1
min_lr_ratio = 0.0
gamma = 0.995
gae_lambda = 0.95
replay_ratio = 1.0
clip_coef = 0.1
vf_coef = 1.0
vf_clip_coef = 0.2
max_grad_norm = 0.5
ent_coef = 0.01
beta1 = 0.95
beta2 = 0.9999
eps = 1e-8
minibatch_size = 32768
horizon = 64
vtrace_rho_clip = 1.0
vtrace_c_clip = 1.0
prio_alpha = 0.8
prio_beta0 = 0.1

[sweep]
metric = score
goal = maximize
