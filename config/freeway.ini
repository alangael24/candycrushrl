[base]
env_name = freeway

[vec]
num_agents = 4096

[policy]
num_layers = 2
num_units = 64

[env]
frameskip = 4
width = 1216
height = 720
player_width = 64
player_height = 64
car_width = 64
car_height = 40
lane_size = 64
difficulty = 0
level = -1
enable_human_player = 0
env_randomization = 1
use_dense_rewards = 1

[train]
total_timesteps = 500_000_000
minibatch_size = 32768

[sweep.train.total_timesteps]
distribution = log_normal
min = 3e8
max = 6e8
mean = 4e8
scale = auto
