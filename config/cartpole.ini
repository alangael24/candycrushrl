[base]
env_name = cartpole

[vec]
total_agents = 4096

[policy]
num_layers = 2
hidden_size = 64

[env]
cart_mass = 1.0
pole_mass = 0.1
pole_length = 0.5
gravity = 9.8
force_mag = 10.0
dt = 0.02
continuous = 0

[train]
total_timesteps = 20_000_000
gamma = 0.95
learning_rate = 0.05
minibatch_size = 32768

[sweep]
method = Protein
metric = perf

[sweep.train.total_timesteps]
distribution = log_normal
min = 5e6
max = 2e7
mean = 1e7
